<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="64" viewBox="0 0 1000 64" role="img" aria-label="03 — Selected Channels">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#30363d" stop-opacity="0"/>
      <stop offset=".32" stop-color="#30363d"/>
      <stop offset=".68" stop-color="#30363d"/>
      <stop offset="1" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; }
      .pill { fill: #f6f8fa; stroke: #d0d7de; }
      .title { fill: #24292f; animation: reveal 1s ease-out both; }
      .index { fill: #6e7781; animation: reveal 1s .12s ease-out both; }
      .line { animation: breathe 4s 1.2s ease-in-out infinite; }
      @media (prefers-color-scheme: dark) {
        .pill { fill: #0d1117; stroke: #30363d; }
        .title { fill: #e6edf3; }
        .index { fill: #8b949e; }
      }
      @keyframes reveal { from { opacity: .2; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes breathe { 0%, 100% { opacity: .42; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>
  <rect class="line" x="0" y="31.5" width="1000" height="1" fill="url(#line)"/>
  <rect class="pill" x="359" y="8" width="282" height="48" rx="24"/>
  <text class="index" x="392" y="37" font-size="12" font-weight="600" letter-spacing="2">03</text>
  <text class="title" x="436" y="38" font-size="17" font-weight="500" letter-spacing="2.2">SELECTED CHANNELS</text>
</svg>
