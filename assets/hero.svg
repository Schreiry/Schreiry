<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title description">
  <title id="title">Schreiry</title>
  <desc id="description">Georgian Technical University. Engineering is not a hobby, it is a method of thought.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0d"/>
      <stop offset=".48" stop-color="#11151a"/>
      <stop offset="1" stop-color="#090b0e"/>
    </linearGradient>
    <radialGradient id="ambient" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#d8dde4" stop-opacity=".12"/>
      <stop offset=".48" stop-color="#8c949e" stop-opacity=".035"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#717984"/>
      <stop offset=".3" stop-color="#f0f3f6"/>
      <stop offset=".52" stop-color="#969eaa"/>
      <stop offset=".75" stop-color="#f0f3f6"/>
      <stop offset="1" stop-color="#717984"/>
      <animate attributeName="x1" values="-1;0;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1;2" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#30363d" stop-opacity="0"/>
      <stop offset=".5" stop-color="#8b949e"/>
      <stop offset="1" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }
      .ambient {
        animation: drift 11s ease-in-out infinite alternate;
        transform-origin: center;
      }
      .reveal-one { animation: reveal 1.2s cubic-bezier(.2,.7,.2,1) both; }
      .reveal-two { animation: reveal 1.2s .18s cubic-bezier(.2,.7,.2,1) both; }
      .reveal-three { animation: reveal 1.2s .36s cubic-bezier(.2,.7,.2,1) both; }
      .reveal-four { animation: reveal 1.2s .54s cubic-bezier(.2,.7,.2,1) both; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; }
      @keyframes reveal {
        from { opacity: .18; transform: translateY(9px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes drift {
        from { transform: translateX(-35px) scale(.94); opacity: .68; }
        to { transform: translateX(35px) scale(1.06); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#background)"/>
  <rect x=".5" y=".5" width="1199" height="339" rx="21.5" fill="none" stroke="#30363d"/>
  <ellipse class="ambient" cx="600" cy="146" rx="390" ry="170" fill="url(#ambient)" filter="url(#blur)"/>

  <g class="reveal-one">
    <circle class="pulse" cx="474" cy="61" r="3.5" fill="#c9d1d9"/>
    <text x="600" y="66" fill="#8b949e" font-size="13" font-weight="500" letter-spacing="5" text-anchor="middle">GEORGIAN TECHNICAL UNIVERSITY</text>
  </g>

  <text class="reveal-two" x="600" y="164" fill="url(#metal)" font-size="78" font-weight="600" letter-spacing="14" text-anchor="middle">SCHREIRY</text>
  <rect class="reveal-three" x="350" y="194" width="500" height="1" fill="url(#edge)"/>
  <text class="reveal-three" x="600" y="231" fill="#a5adb7" font-size="18" font-weight="400" letter-spacing="1.6" text-anchor="middle">ENGINEERING. NOT A HOBBY — A METHOD OF THOUGHT.</text>
  <text class="reveal-four" x="600" y="282" fill="#626b76" font-size="13" font-weight="400" letter-spacing=".55" text-anchor="middle">Technology is a tool that changes culture, but people fill the new cultural form with their own content.</text>
</svg>
